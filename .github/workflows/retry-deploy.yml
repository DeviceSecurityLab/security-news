name: Retry failed Pages deploy

on:
  workflow_run:
    workflows: ["Deploy Hugo site to GitHub Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    # run_attempt guard caps total attempts so a persistent outage cannot loop forever
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Wait 5 minutes for the Pages outage to clear
        run: sleep 300

      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
